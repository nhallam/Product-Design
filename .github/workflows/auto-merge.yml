name: Auto-merge on Vercel success

on:
  status:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge open PR for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "status" ]; then
            # Ignore non-Vercel or non-success status events
            if [ "${{ github.event.state }}" != "success" ] || [ "${{ github.event.context }}" != "Vercel" ]; then
              echo "Not a Vercel success, skipping"
              exit 0
            fi
            SHA="${{ github.event.sha }}"
          else
            # pull_request event — check if Vercel has already passed
            SHA="${{ github.event.pull_request.head.sha }}"
            STATUS=$(gh api "repos/$GITHUB_REPOSITORY/commits/$SHA/status" --jq '.state')
            if [ "$STATUS" != "success" ]; then
              echo "Vercel not yet passed (status: $STATUS), skipping"
              exit 0
            fi
          fi

          PR=$(gh pr list \
               --repo "$GITHUB_REPOSITORY" \
               --state open \
               --json number,headRefOid \
               --jq ".[] | select(.headRefOid == \"$SHA\") | .number")
          if [ -n "$PR" ]; then
            echo "Merging PR #$PR"
            gh pr merge "$PR" --rebase --repo "$GITHUB_REPOSITORY"
          else
            echo "No open PR found for SHA $SHA"
          fi
